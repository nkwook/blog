baseURL = 'https://nkwook.github.io/blog/'
languageCode = 'ko'
title = '개발명가'
theme = 'PaperMod'
enableRobotsTXT = true
[pagination]
  pagerSize = 10

[params]
  mainSections = ["posts"]
  env = "production"
  defaultTheme = "auto"
  showReadingTime = true
  showShareButtons = false
  showPostNavLinks = true
  showBreadCrumbs = true
  showCodeCopyButtons = true
  DateFormat = "2006-01-02"
  description = "AI, 개발, 사이드 프로젝트에 대한 기술 블로그"
  author = "nkwook"
  keywords = ["AI", "vector search", "개발", "사이드프로젝트", "RAG", "LLM"]

  [params.homeInfoParams]
    Title = "개발명가"
    Content = "AI, 개발, 사이드 프로젝트에 대한 기술 블로그"

[menu]
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 10
  [[menu.main]]
    identifier = "macro-study"
    name = "Macro Study"
    url = "/macro-study/"
    weight = 15
  [[menu.main]]
    identifier = "archives"
    name = "Archives"
    url = "/archives/"
    weight = 20

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "monokai"
